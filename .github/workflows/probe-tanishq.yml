name: probe-tanishq
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install curl_cffi
      - name: Probe Tanishq + Mia from GitHub runner IP
        run: |
          python - <<'PY'
          from curl_cffi import requests as cr
          import re, json, html as H
          urls = [
              ("Tanishq", "https://www.tanishq.co.in/gold-rate.html"),
              ("Mia",     "https://www.miabytanishq.com/en_IN/gold-rate-today"),
          ]
          for name, url in urls:
              try:
                  r = cr.Session(impersonate="chrome131").get(url, timeout=25)
                  blocked = "Access Blocked" in r.text or r.status_code != 200
                  m = re.search(r'id="goldRateValues"[^>]*?value="(.*?)"\s*/?>', r.text, re.DOTALL)
                  rate = None
                  if m:
                      try:
                          row = json.loads(H.unescape(m.group(1)))["GetDailyMetalRates"][0]
                          rate = f"22K={row['GoldRate22KT']} 24K={row['GoldRate24KT']} 18K={row['GoldRate18KT']}"
                      except Exception:
                          pass
                  print(f"{name}: status={r.status_code} bytes={len(r.text)} blocked={blocked} RATE={rate}")
              except Exception as e:
                  print(f"{name}: ERROR {e}")
          PY
