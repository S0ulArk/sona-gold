<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0c0c0d">
    <title>SONA — Live Gold Rates · Delhi & UP West</title>
    <meta name="description" content="Compare today's 22K, 24K & 18K gold rates across jewellers in Delhi, Moradabad & Bareilly — live, side by side.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/chart.umd.min.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23fde047'/><stop offset='.55' stop-color='%23fbbf24'/><stop offset='1' stop-color='%23f59e0b'/></linearGradient></defs><rect width='100' height='100' rx='24' fill='%230c0c0d'/><text x='50' y='73' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='70' fill='url(%23g)'>S</text></svg>">
</head>
<body>
    <main class="page">
        <header class="masthead">
            <div class="brand">Sona</div>
            <div class="brand-rule"></div>
            <div class="eyebrow"><span class="date" id="eb-date">—</span><span class="sep">·</span><span class="live"><span class="dot"></span>LIVE</span></div>
            <h1 class="headline">Today&rsquo;s gold rate, <em>store by store.</em></h1>
        </header>

        <section class="hero" aria-live="polite">
            <div class="hero-glow"></div>
            <div class="hero-num num" id="hero-num">₹—</div>
            <div class="hero-best" id="hero-best"><span class="sep">Loading live rates…</span></div>
            <div class="hero-unit">Per gram · lowest live price</div>
            <div class="hero-spark" id="hero-spark" aria-hidden="true"></div>
        </section>

        <div class="purity-wrap">
            <div class="purity" id="purity" role="group" aria-label="Select gold purity">
                <button type="button" data-purity="22k" class="active" aria-pressed="true">22K</button>
                <button type="button" data-purity="24k" aria-pressed="false">24K</button>
                <button type="button" data-purity="18k" aria-pressed="false">18K</button>
            </div>
        </div>

        <section class="figs" aria-label="Market statistics">
            <div class="fig"><div class="fig-v num" id="stat-median">₹—</div><div class="fig-l">Median</div></div>
            <div class="fig"><div class="fig-v num" id="stat-spread">₹—</div><div class="fig-l">Spread</div></div>
            <div class="fig"><div class="fig-v num" id="stat-count">—</div><div class="fig-l">Live stores</div></div>
        </section>

        <div class="sec-label"><span>Store by store</span></div>
        <ul class="stores" id="stores"></ul>

        <div class="sec-label"><span>30-day trend</span></div>
        <section class="chart-card">
            <div class="chart-head">
                <h2>Market trend</h2>
                <span class="cap" id="chart-cap">Median · 22K</span>
            </div>
            <div class="chart-box"><canvas id="chart"></canvas></div>
        </section>

        <footer class="foot">
            <div class="rule"></div>
            Indicative only; confirm in-store before purchase.
        </footer>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
